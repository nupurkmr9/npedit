# Z-Image (Tongyi-MAI/Z-Image) configuration for Flow Matching training
# Critic: InternVL2.5-8B (OpenGVLab/InternVL2_5-8B)
student:
  model:
    vae:
      module: "models.zimage_vae.ZImageVAE"
      params:
        version: "Tongyi-MAI/Z-Image"
        dtype: "fp32"
        scale_factor: 0.3611
        shift_factor: 0.1159
        chunk_size: 64

    text_encoder:
      module: "models.zimage_text.ZImageTextEmbedder"
      params:
        version: "Tongyi-MAI/Z-Image"
        max_length: 512
        dtype: "bf16"
        compile: false
        float32_matmul_precision: "high"
        padding_side: "right"
        attn_mask_padding: true
        output_exclude_padding: true
        flatten_output: false
        apply_chat_template: true
      fsdp:
        shard_size: null
        param_dtype: "bf16"
        reduce_dtype: "bf16"
        ac_freq: 0
        blocks_attr: "hf_module.layers"
        reshard_after_forward_policy: "always"

    denoiser:
      module: "models.zimage_denoiser.ZImageDenoiser"
      params:
        version: "Tongyi-MAI/Z-Image"
        dtype: "bf16"
        reference_image: true
      fsdp:
        meta_device_init: true
        shard_size: null
        param_dtype: "bf16"
        reduce_dtype: "fp32"
        ac_freq: 4
        blocks_per_shard_group: 1
        blocks_attr: [ "transformer.layers" ]
        reshard_after_forward_policy: "default"

    time_sampler:
      module: "utils_fm.noiser.DMDTimeSampler"
      params:
        use_logit_normal: false
        mu: 0.0
        sigma: 1.0
        dmd_time_steps: [1.0, 0.9474, 0.8571, 0.6667]

    time_warper:
      module: "utils_fm.noiser.TimeWarper"
      params:
        base_len: 256
        base_shift: 0.5
        max_len: 4096
        max_shift: 1.15
        time_shift_type: "linear"
        shift: 1.0  # Z-Image scheduler uses shift=6.0

    time_weighter:
      module: "utils_fm.noiser.TimeWeighter"
      params:
        use_logit_normal: false
        mu: 0.0
        sigma: 1.0

    flow_noiser:
      module: "utils_fm.noiser.FlowNoiser"
      params:
        compute_dtype: "fp32"

teacher:
  model:
    denoiser:
      module: "models.zimage_denoiser.ZImageDenoiser"
      params:
        version: "Tongyi-MAI/Z-Image"
        dtype: "bf16"
        reference_image: false
      fsdp:
        meta_device_init: true
        shard_size: null
        param_dtype: "bf16"
        reduce_dtype: "fp32"
        ac_freq: 4
        blocks_per_shard_group: 1
        blocks_attr: [ "transformer.layers" ]
        reshard_after_forward_policy: "always"

    time_sampler:
      module: "utils_fm.noiser.TimeSampler"
      params:
        use_logit_normal: false
        mu: 0.0
        sigma: 1.0
        # num_train_timesteps: 1000
        min_timestep: 0.02
        max_timestep: 0.98

    time_warper:
      module: "utils_fm.noiser.TimeWarper"
      params:
        time_shift_type: "linear"
        base_len: 256
        base_shift: 0.5
        max_len: 4096
        max_shift: 1.15
        shift: 1.0

    time_weighter:
      module: "utils_fm.noiser.TimeWeighter"
      params:
        use_logit_normal: false
        mu: 0.0
        sigma: 1.0

    flow_noiser:
      module: "utils_fm.noiser.FlowNoiser"
      params:
        compute_dtype: "fp32"

aux:
  model:
    denoiser:
      module: "models.zimage_denoiser.ZImageDenoiser"
      params:
        version: "Tongyi-MAI/Z-Image"
        dtype: "bf16"
        reference_image: false
      fsdp:
        meta_device_init: true
        shard_size: null
        param_dtype: "bf16"
        reduce_dtype: "fp32"
        ac_freq: 4
        blocks_attr: [ "transformer.layers" ]
        reshard_after_forward_policy: "default"

    time_sampler:
      module: "utils_fm.noiser.TimeSampler"
      params:
        use_logit_normal: false
        mu: 0.0
        sigma: 1.0

    time_warper:
      module: "utils_fm.noiser.TimeWarper"
      params:
        time_shift_type: "linear"
        base_len: 256
        base_shift: 0.5
        max_len: 4096
        max_shift: 1.15
        shift: 1.0

    time_weighter:
      module: "utils_fm.noiser.TimeWeighter"
      params:
        use_logit_normal: false
        mu: 0.0
        sigma: 1.0

    flow_noiser:
      module: "utils_fm.noiser.FlowNoiser"
      params:
        compute_dtype: "fp32"

critic:
  module: "critic_models.critic.InternVLCritic"
  params:
    model_name: OpenGVLab/InternVL3-14B
    device: cuda
    image_size: 448
    max_steps_temp: 2000
    compile: false
    dtype: "bf16"
  fsdp:
    shard_size: null
    param_dtype: "bf16"
    reduce_dtype: "fp32"
    ac_freq: 0
    blocks_per_shard_group: 1
    blocks_attr:
      - "model.language_model.model.layers"
      - "model.vision_model.encoder.layers"
    reshard_after_forward_policy: "always"
    offload_params: false
    shard_root: false


trainer:
  module: "trainers.dmd_trainer.DMDTrainer"
  params:
    txt_drop_prob: 0.0
    aux_local_steps_per_global_step: 5

    ema_decay: 0.999

    max_steps: 14000
    warmup_steps: 0

    # AdamW Optimizer Settings
    max_lr: 0.00002 # Maximum learning rate for AdamW optimizer
    min_lr: 0.00002 # Minimum learning rate for cosine decay schedule
    weight_decay: 0.0 # L2 regularization weight decay coefficient
    adam_betas: [0.0, 0.9] # Beta coefficients for AdamW momentum terms [beta1, beta2]

    # AdamW Optimizer Settings
    max_lr_aux: 0.00002 # Maximum learning rate for AdamW optimizer
    min_lr_aux: 0.00002 # Minimum learning rate for cosine decay schedule
    weight_decay_aux: 0.0 # L2 regularization weight decay coefficient
    adam_betas_aux: [0.0, 0.9] # Beta coefficients for AdamW momentum terms [beta1, beta2]

    # Gradient Safeguarding Settings
    gradient_clip_norm: 2.0
    grad_norm_spike_threshold: 300.0
    grad_norm_spike_detection_start_step: 0

    # Update these paths for your Z-Image checkpoints
    init_ckpt_student: "./experiments/zimage_identity_warmup/checkpoints/step_00005000"
    init_ckpt_load_plan_student: "ckpt_model:mem_model"
    ckpt_freq: 1000
    exp_dir: "./experiments/zimage_npedit_internvl"

    # Logging Settings
    wandb_mode: "online" # online, offline, or disabled (disabled = no wandb logging)
    wandb_project: "npedit"
    wandb_name: "zimage_npedit_internvl"
    wandb_entity: ${WANDB_ENTITY}
    log_freq: 10
    image_log_freq: 100

    # Validation Settings
    val_freq: 50_000
    val_num_samples: 32

    # Inference Settings
    inference_at_start: false
    inference_then_exit: false
    inference_freq: 2000

    # LoRA Settings
    lora_rank: 0
    lora_rank_aux: 0

    # Loss hyperparameters
    critic_loss_weight: 0.02
    dmd_loss_weight: 1.0

    data_seed: 48
    start_multistep_sampling_step: 0

inferencer:
  ckpt_dir: "./experiments/zimage_npedit_internvl/checkpoints/student/step_00014000"
  inference_ops_args:
    use_ema: false
    prompt_file: "./resources/inference_prompts.txt"
    output_dir: "./experiments/zimage_npedit_internvl"
    img_fhw: [ 1, 512, 512 ]
    samples_per_prompt: 1
    num_steps: 4
    neg_prompt: ""
    cfg_scale: 1.0
    eta: 1.0
    file_ext: "jpg"
    per_gpu_bs: 1
    guidance: null
    sample_method: "ddim"
    save_as_npz: false
    timesteps: [1.0, 0.9474, 0.8571, 0.6667]

data:
  module: "data.instruct.InstructDataModule"
  params:
    batch_size: 1
    resolution: 512
    num_workers: 8
    p_horizon_flip: 0.
    do_nothing_prob: 0.01
    critic_model_name: "OpenGVLab/InternVL3-14B"
    critic_identity_model_name: "OpenGVLab/InternVL3-14B"
    # gedit_bench_data_path: "temp"
    bucketize: true
    resolution_buckets:
      - [512, 512]
      - [576, 448]
      - [448, 576]
      - [640, 384]
      - [384, 640]
      - [512, 384]
      - [384, 512]
    edit_data_path: "./datasets/merged_edit_data.json"
    edit_data_root_dir: "./datasets"
    edit_type_probs:
      remove: 0.25
      local color change: 0.0833
      texture: 0.0833
      shape change: 0.0833
      insertion: 0.0833
      replace: 0.0833
      background change: 0.0833
      style: 0.0833
      action: 0.0833
      text: 0.0837
